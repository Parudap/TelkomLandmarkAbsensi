<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">

    <!-- Flash Messages -->
    
    
    
    <!-- Main Content -->
    <main class="py-8">
        <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Login</h1>
            <p class="text-gray-600 mt-2">Sistem Absensi Magang</p>
        </div>

        
        <form method="POST" action="http://telkomlandmark.test/login" class="space-y-6">
            <input type="hidden" name="_token" value="FUsgOZn78BSvjuydqZOR0uM6C1bZ7ZW1RlIdgPag" autocomplete="off">
            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    Email
                </label>
                <input type="email" id="email" name="email" value="" required autofocus
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
                    placeholder="contoh@email.com">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
                    placeholder="Masukkan password">
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember" 
                    class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 rounded">
                <label for="remember" class="ml-2 block text-sm text-gray-700">
                    Ingat saya
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Belum punya akun? 
                <a href="http://telkomlandmark.test/register" class="text-red-600 hover:text-red-700 font-medium">
                    Daftar di sini
                </a>
            </p>
        </div>
    </div>
</div>
